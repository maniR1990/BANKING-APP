events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate limiting zone for auth endpoints
    # Limit to 5 requests per second per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    server {
        listen 80;

        # --- 1. Internal Validation Point ---
        # Hidden from the outside world. Nginx calls this internally.
        location = /internal-auth-validate {
            internal;
            proxy_pass http://banking_auth:3000/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # --- 2. Auth Service (Public Endpoints) ---
        # Allow everyone to reach Register and Login
        location /auth/login {
            # Apply rate limiting: burst 10 requests, delay after burst
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://banking_auth:3000/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/register {
            # Apply rate limiting: burst 10 requests, delay after burst
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://banking_auth:3000/auth/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/ {
            proxy_pass http://banking_auth:3000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- 3a. Customer Service (UNPROTECTED Health Check) ---
        # Bypasses auth so Docker and monitoring tools don't get 500 errors
        location /customer/api/health {
            proxy_pass http://banking_customer:3002/api/health;
            proxy_set_header Host $host;
        }

        # --- 3b. Protected Customer Service ---
        location /customer/ {
            auth_request /internal-auth-validate; # THE GUARD
            
            # If valid, Auth service returns X-User-ID. We capture it here.
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-ID $user_id;

            proxy_pass http://banking_customer:3002/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- 4a. Account Service (UNPROTECTED Health Check) ---
        # Bypasses auth so Docker and monitoring tools don't get 500 errors
        location /account/api/health {
            proxy_pass http://banking_account:3001/api/health;
            proxy_set_header Host $host;
        }

        # --- 4b. Protected Account Service ---
        location /account/ {
            auth_request /internal-auth-validate; # THE GUARD
            
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-ID $user_id;

            proxy_pass http://banking_account:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Gateway Health Check ---
        location /health {
            return 200 '{"status": "gateway-up"}';
            add_header Content-Type application/json;
        }
    }
}