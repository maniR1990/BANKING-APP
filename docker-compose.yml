version: '3.8'

services:
  # --- Database (PostgreSQL) ---
  postgres:
    image: postgres:15-alpine
    container_name: banking_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - banking_network

  # --- Session Store (Redis) ---
  banking_redis:
    image: redis:7-alpine
    container_name: banking_redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - banking_network

  # --- Auth Microservice ---
  auth-service:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: banking_auth
    environment:
      PORT: 3000
      REDIS_HOST: banking_redis
      DB_HOST: banking_postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_NAME: banking_auth
    depends_on:
      banking_redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # Auth uses /health because of the Terminus setup we added
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - banking_network

  # --- Customer Microservice ---
  customer-service:
    build:
      context: .
      dockerfile: apps/customer/Dockerfile
    container_name: banking_customer
    environment:
      DB_HOST: banking_postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_NAME: banking_customer
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Matches app.setGlobalPrefix('api')
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - banking_network

  # --- Account Microservice ---
  account-service:
    build:
      context: .
      dockerfile: apps/account/Dockerfile
    container_name: banking_account
    environment:
      # Providing both individual vars and URL for maximum compatibility
      DATABASE_URL: postgresql://postgres:admin@banking_postgres:5432/banking_account
      DB_HOST: banking_postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_NAME: banking_account
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Matches app.setGlobalPrefix('api')
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - banking_network

  # --- API Gateway (Nginx) ---
  api-gateway:
    image: nginx:alpine
    container_name: banking_gateway
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
    networks:
      - banking_network

networks:
  banking_network:
    driver: bridge

volumes:
  postgres_data:
