apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
      - name: swagger-ui
        image: swaggerapi/swagger-ui:latest
        ports:
        - containerPort: 8080
        env:
        # Directly hitting each service's NodePort — bypasses Nginx auth entirely
        - name: URLS
          value: "[{ url: 'http://localhost:30000/public/auth/api/docs-json', name: 'Auth API' }, { url: 'http://localhost:30001/public/account/api/docs-json', name: 'Account API' }, { url: 'http://localhost:30002/public/customer/api/docs-json', name: 'Customer API' }]"
---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui
spec:
  # THIS IS THE MAGIC: Bypasses Ingress and binds directly to localhost:8080
  type: LoadBalancer 
  selector:
    app: swagger-ui
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080