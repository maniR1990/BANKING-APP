apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-account
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-account
  template:
    metadata:
      labels:
        app: banking-account
    spec:
      containers:
        - name: account
          image: banking-app-account-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: '3001'
            - name: DATABASE_URL
              value: 'postgresql://postgres:admin@banking-postgres:5432/banking_account'
            - name: DB_HOST
              value: 'banking-postgres'
            - name: DB_PORT
              value: '5432'
            - name: DB_USERNAME
              value: 'postgres'
            - name: DB_PASSWORD
              value: 'admin'
            - name: DB_NAME
              value: 'banking_account'
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: banking-account
spec:
  selector:
    app: banking-account
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
