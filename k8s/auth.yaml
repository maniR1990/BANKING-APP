apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-auth
  template:
    metadata:
      labels:
        app: banking-auth
    spec:
      containers:
        - name: auth
          image: banking-app-auth-service:latest
          imagePullPolicy: Never # Forces K8s to use your local Docker image
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: banking-shared-config
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: '3000'
            - name: REDIS_HOST
              value: 'banking-redis'
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-db-secrets
                  key: postgres-password
            - name: DB_NAME
              value: 'banking_auth'
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: banking-auth
spec:
  selector:
    app: banking-auth
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort

---
# 3. Ingress Routing Entrypoint
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-auth-ingress
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:8080"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-ID"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: banking-auth
                port:
                  number: 3000

---
# 4. Health Check Ingress (Public - No Auth Guard)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-auth-health-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /health
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:8080"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Content-Type"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /public/auth/health
            pathType: Exact
            backend:
              service:
                name: banking-auth
                port:
                  number: 3000
---
# 5. Ingress for Swagger Docs (Public + CORS enabled for UI on 8080)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-auth-docs-ingress
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:8080"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS, DELETE, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /public/auth/api/docs
            pathType: Prefix
            backend:
              service:
                name: banking-auth
                port:
                  number: 3000
          - path: /public/auth/api/docs-json
            pathType: Prefix
            backend:
              service:
                name: banking-auth
                port:
                  number: 3000
