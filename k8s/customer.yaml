apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-customer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-customer
  template:
    metadata:
      labels:
        app: banking-customer
    spec:
      containers:
        - name: customer
          image: banking-app-customer-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: '3002'
            - name: DB_HOST
              value: 'banking-postgres'
            - name: DB_PORT
              value: '5432'
            - name: DB_USERNAME
              value: 'postgres'
            - name: DB_PASSWORD
              value: 'admin'
            - name: DB_NAME
              value: 'banking_customer'
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: banking-customer
spec:
  selector:
    app: banking-customer
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
  type: ClusterIP
