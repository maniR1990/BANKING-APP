# 1. ConfigMap containing your Nginx Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Rate limiting zone for auth endpoints
        limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

        server {
            listen 80;

            # --- 1. Internal Validation Point ---
            location = /internal-auth-validate {
                internal;
                # UPDATED: changed underscore to dash
                proxy_pass http://banking-auth:3000/auth/validate;
                proxy_pass_request_body off;
                proxy_set_header Content-Length "";
                proxy_set_header X-Original-URI $request_uri;
            }

            # --- 2. Auth Service ---
            location /auth/login {
                limit_req zone=auth_limit burst=10 nodelay;
                proxy_pass http://banking-auth:3000/auth/login;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /auth/register {
                limit_req zone=auth_limit burst=10 nodelay;
                proxy_pass http://banking-auth:3000/auth/register;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /auth/health {
                proxy_pass http://banking-auth:3000/health;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            location /auth/ {
                proxy_pass http://banking-auth:3000/auth/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # --- 3. Customer Service ---
            location /customer/api/health {
                proxy_pass http://banking-customer:3002/api/health;
                proxy_set_header Host $host;
            }

            location /customer/ {
                auth_request /internal-auth-validate;
                auth_request_set $user_id $upstream_http_x_user_id;
                proxy_set_header X-User-ID $user_id;
                proxy_pass http://banking-customer:3002/;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # --- 4. Account Service ---
            location /account/api/health {
                proxy_pass http://banking-account:3001/api/health;
                proxy_set_header Host $host;
            }

            location /account/ {
                auth_request /internal-auth-validate;
                auth_request_set $user_id $upstream_http_x_user_id;
                proxy_set_header X-User-ID $user_id;
                proxy_pass http://banking-account:3001/;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # --- Gateway Health Check ---
            location /health {
                return 200 '{"status": "gateway-up"}';
                add_header Content-Type application/json;
            }
        }
    }

---
# 2. Deployment for the Nginx Container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-gateway
  template:
    metadata:
      labels:
        app: banking-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config

---
# 3. LoadBalancer Service to expose Port 80 to your local machine
apiVersion: v1
kind: Service
metadata:
  name: banking-gateway
spec:
  selector:
    app: banking-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
