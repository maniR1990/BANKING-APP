# 1. ConfigMap for the init-db.sql script
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init-db.sql: |
    -- This matches the SQL script you provided earlier
    CREATE DATABASE banking_auth;
    CREATE DATABASE banking_customer;
    CREATE DATABASE banking_account;

---
# 2. Persistent Volume Claim for database storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi # Asking for 1 Gigabyte of storage

---
# 3. StatefulSet for the Postgres container
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: banking-postgres
spec:
  serviceName: 'banking-postgres'
  replicas: 1
  selector:
    matchLabels:
      app: banking-postgres
  template:
    metadata:
      labels:
        app: banking-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-db-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'postgres', '-d', 'postgres']
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ['pg_isready', '-U', 'postgres', '-d', 'postgres']
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-script
          configMap:
            name: postgres-init-script

---
# 4. Service to expose Postgres internally (like a DNS name)
apiVersion: v1
kind: Service
metadata:
  name: banking-postgres
spec:
  selector:
    app: banking-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP # Only accessible inside the cluster
